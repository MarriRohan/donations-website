<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your India Relief Connect account and start making a difference today.">
    <title>Sign Up — India Relief Connect</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">🇮🇳 India Relief Connect</a>
    </nav>

    <div class="form-container">
        <h2>Join the Movement</h2>
        <p class="form-subtitle">Create an account to donate or seek help</p>
        <form id="signup-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" class="form-control" placeholder="Your full name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" class="form-control" placeholder="Create a strong password" required>
            </div>
            <div class="form-group">
                <label>I am a...</label>
                <select id="role" class="form-control" required>
                    <option value="donor">💝 Donor — I want to help others</option>
                    <option value="needy">🙏 Seeker — I need financial assistance</option>
                    <option value="admin">🔧 Admin — Platform management</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Create Account</button>
        </form>
        <div class="form-footer">
            <p>Already have an account? <a href="login.html">Login</a></p>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;

            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, role })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.msg);

                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                
                showToast('Account created! Welcome aboard! 🎉', 'success');
                setTimeout(() => {
                    if (data.user.role === 'admin') window.location.href = 'admin.html';
                    else window.location.href = 'dashboard.html';
                }, 600);
            } catch (err) {
                showToast(err.message, 'error');
            }
        });
    </script>
</body>
</html>
